services:
  signa-api:
    container_name: signa-api
    build:
      context: ./SignaApiv1
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - signa-network

  signa-web:
    container_name: signa-web
    build:
      context: ./SignaLife
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: /api
    depends_on:
      - signa-api
    ports:
      - "3001:3000"
    restart: unless-stopped
    networks:
      - signa-network

networks:
  signa-network:
    driver: bridge
